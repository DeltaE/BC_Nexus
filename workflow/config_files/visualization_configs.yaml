
interactive_dashboard:
    title : "CLEWs-BC results (case : REF)"
    font_size : "32px"
    font_color : "#00008B"
    plot_width: '45%'
    plot_height: '80%'
    index_html_directory: '/home/eliasinul/repositories/BC-CLEWS-Model/index.html'
    style_css_directory : '/home/eliasinul/repositories/BC-CLEWS-Model/style.css'

capacity_plots:

  filenames: ["NewCapacity.csv","TotalCapacityAnnual.csv"]

  filenames_mapping: {
      'NewCapacity.csv':'New Capacity',
      'TotalCapacityAnnual.csv':'Total Capacity'
  }

  technologies : ['PWRWND','PWRNGS','PWRBIO', 'PWRHYD', 'PWRSOL', 'PWRGEO', 'PWRURN']

  custom_colors : {
      'PWRWND': '#DDB3F9',
      'PWRNGS': '#D27A78',
      'PWRBIO': '#5BAB59',
      'PWRHYD': '#86B4D8',
      'PWRSOL': '#FEE566',
      'PWRGEO': '#B067B3',
      'PWRURN': 'gray'
  }

  legend_labels : {
      'PWRWND': 'Wind',
      'PWRNGS': 'Natural Gas',
      'PWRBIO': 'Biomass/Biofuel',
      'PWRHYD': 'Hydro',
      'PWRSOL': 'Solar',
      'PWRGEO': 'Geothermal',
      'PWRURN': 'Nuclear'
  }

emission_plots:

  filenames : ["AnnualEmissions.csv", "AnnualTechnologyEmission.csv"]

  filenames_mapping : {
      'AnnualTechnologyEmission.csv': 'Emission by Sector',
      'AnnualEmissions.csv': 'Emission'
  }
  technologies : ['DEMAGR', 'DEMCOM', 'DEMIND', 'DEMRES', 'DEMTRA']

  custom_colors : {
      'DEMAGR': '#C57F7B',
      'DEMCOM': '#65B465',
      'DEMIND': '#B3B3B3',
      'DEMRES': '#87B4D7',
      'DEMTRA': '#676767',
  }

  legend_labels : {
      'DEMRES': 'Residential',
      'DEMIND': 'Industrial',
      'DEMTRA': 'Transport',
      'DEMAGR': 'Agricultural',
      'DEMCOM': 'Commercial'
  }

