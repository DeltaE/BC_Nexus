codes:
  fuels:
    'WND': Wind
    'COA': Coal
    'ELC': Electricity
  indetifiers:
    '00': Raw Resource
    '01': Intermediate
    '02': End Use
  techs:
    'MIN': Mining
    'PWR': Generator
    'TRN': Transmission

schema:
  FUEL:
  - name: fuel_name
    items:
      - name: fuels
        valid: fuels
        position: (1, 3)
      - name: indetifiers
        valid: indetifiers
        position: (4, 5)
  TECHNOLOGY:
  - name: technology_name
    items:
      - name: techs
        valid: techs
        position: (1, 3)
      - name: fuels
        valid: fuels
        position: (4, 6)
