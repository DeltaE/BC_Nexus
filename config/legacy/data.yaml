Gov:
  conservation_lands:
    url: https://data-donnees.az.ec.gc.ca/api/file?path=%2Fspecies%2Fprotectrestore%2Fcanadian-protected-conserved-areas-database%2FDatabases%2FProtectedConservedArea_2023.zip
    # consideration:
    #   solar: 'yes'
    #   wind: 'yes'
    root: 'data/downloaded_data/Gov/Conservation_Lands'
    data_name: 'ProtectedConservedArea'  # Zip and the processed data will be saved with this prefix
    IUCN_CAT_mapping: # Check TABLE 10 of user manual from the source_url.
      1: 'Strict  Nature Reserve'
      2: 'Wilderness Area'
      3: 'National Park'
      4: 'Natural Monument or Feature'
      5: 'Habitat/Species Management Area'
      6: 'Protected Landscape/Seascape'
      7: 'Protected Area with Sustainable Use of Natural Resources'
      8: 'Interim Sites (unknown specifics)'
      9 : 'OECM areas'
    LOCATION_mapping: # Check TABLE 13 of user manual from the source_url.
      "Alberta": 1
      "British Columbia": 2
      "Manitoba": 3
      "New Brunswick": 4
      "Newfoundland and Labrador": 5
      "Northwest Territories": 6
      "Nova Scotia": 7
      "Nunavut": 8
      "Ontario": 9
      "Prince Edward Island": 10
      "Quebec": 11
      "Saskatchewan": 12
      "Yukon": 13
      
      # not in use
      "Coastal Arctic Marine": 14
      "Coastal Atlantic Marine": 15
      "Coastal Pacific Marine": 16
      "Offshore Arctic Marine": 17
      "Offshore Atlantic Marine": 18
      "Offshore Pacific Marine": 19
      "Arctic Marine Coastal/Offshore": 20
      "Offshore Arctic/Atlantic Marine": 21

    LAND_OWNER_mapping:
      1: "Federal Govt."
      2: "Provincial / territorial Govt"
      3: "Municipal government"
      4: "Indigenous Community/People"
      5: "Communal ownership"
      6: "Individual landowners"
      7: "For-profit organizations" # (private companies or corporations – crown corporations should be reported as federal or provincial/territory)"
      8: "Non-profit organizations"
      9: "Joint ownership" #Under the joint ownership of more than one actor, representing more than one accepted value (e.g. non-profit organizations and for-profit organizations)"
      10: "Multiple ownership" # Different parts of the land and/or waters are owned by different actors, representing more than one accepted value"
      11: "Contested Ownership" # is contested
      12: "not known or reported" # by the data provider

    data_license: https://catalogue.ec.gc.ca/geonetwork/oilsands/api/records/6c343726-1e92-451a-876a-76e17d398a1c
  Population:
    root: 'data/downloaded_data/Gov/Population'
    datafile: 'Population_Projections.csv'
    skiprows: 6 # top 6 rows are data descriptions
    different_name_mapping: # these names differs with GADM naming
      Columbia Shuswap: Columbia-Shuswap
      Strathcona: Comox-Strathcona
      Metro Vancouver: Greater Vancouver
      Metro-Vancouver : Greater Vancouver
      qathet: Powell River
      North Coast: Skeena-Queen Charlotte
      Stikine (Census Division): Stikine
      Northern Rockies (Census Division): Northern Rockies
  CEEI: #Community Energy and Emissions Inventory
    root: 'data/downloaded_data/Gov/CEEI'
    datafile:
      buildings: bc_utilities_energy_and_emissions_data_at_the_community_level.xlsx
      transportation: bc_on_road_transportation_data_at_the_community_level.xlsx
      waste: bc_municipal_solid_waste_data_at_the_community_level.xlsx
    source:
      buildings: https://www2.gov.bc.ca/assets/gov/environment/climate-change/data/ceei/bc_utilities_energy_and_emissions_data_at_the_community_level.xlsx
      transportation: https://www2.gov.bc.ca/assets/gov/environment/climate-change/data/ceei/bc_on_road_transportation_data_at_the_community_level.xlsx
      waste: https://www2.gov.bc.ca/assets/gov/environment/climate-change/data/ceei/bc_municipal_solid_waste_data_at_the_community_level.xlsx

NREL: 
  ATB: # Annual technology Baseline (ATB) - 2024\
    root : 'data/downloaded_data/NREL/ATB'
    source: # parquet file recommended for less memory usage
      # excel: https://data.openei.org/files/6006/2024%20v2%20Annual%20Technology%20Baseline%20Workbook%20Errata%207-19-2024.xlsx
      csv: https://oedi-data-lake.s3.amazonaws.com/ATB/electricity/csv/2024/ATBe.csv
      parquet: https://oedi-data-lake.s3.amazonaws.com/ATB/electricity/parquet/2024/ATBe.parquet
    datafile:
      # excel: https://data.openei.org/files/6006/2024%20v2%20Annual%20Technology%20Baseline%20Workbook%20Errata%207-19-2024.xlsx
      csv: ATBe.csv #96 MB
      parquet: ATBe.parquet #5 MB
    about: https://atb.nrel.gov/electricity/2024/technologies
    column: 'core_metric_parameter'
    cost_params:
      capex: 'CAPEX' # mill. $/ MW
      fom: 'Fixed O&M' # mill. $/ MW
      vom: 'None' # Not found for solar,wind,bess


OSM_data: # OpenStreet Map
  root: 'data/downloaded_data/OSM'
  data_keys: # has to be inline with OSM tags
    aeroway:
      tags: ['aerodrome', 'runway', 'taxiway', 'helipad', 'apron', 'gate']
    power:
      tags: ['line', 'cable', 'minor_line', 'substation', 'tower', 'pole', 'generator', 'plant', 'terminal']
    substation:
      tags: ['transmission', 'distribution', 'minor_distribution', 'industrial']

# Directories
pypsa:
  custom: # need to automate this or upload to repo. Pierre created this manually
      gen_wup: "data/downloaded_data/custom/hydro_gen_wup_features.csv"
      res_wup: "data/downloaded_data/custom/hydro_res_wup_features.csv"
      inflow_tables: "data/downloaded_data/custom/inflow_stats" # Has standardized names inside which are assumed
      line_table: "data/downloaded_data/custom/electric_power_generation_table_13_3a.xlsx" # Custom table for infering line parameters
  basin_files:  # need to automate this or upload to repo. Pierre created this manually
      na_file: "data/downloaded_data/HydroBASINS/hybas_na_lev12_v1c.shp"
      artic_file: "data/downloaded_data/HydroBASINS_artic/hybas_ar_lev12_v1c.shp"
  data: #Temp
    wind:
      can_turbines: "data/downloaded_data/wind/canada_turbines.xlsx"
      turbine_dict: "data/downloaded_data/wind/turbine_dict.json"
      gwa_speed: "data/downloaded_data/wind/british_columbia_wspd_100m.tif"
      gwa_geojson: "data/downloaded_data/wind/british_columbia.geojson"
    coders:
      gen_generic: "data/downloaded_data/CODERS/data-pull/supply/generation_generic.csv"
      hydro_existing: "data/downloaded_data/CODERS/data-pull/supply/hydro_existing.csv"
      generators: "data/downloaded_data/CODERS/data-pull/supply/generators.csv"
      hydro_cascade: "data/downloaded_data/CODERS/data-pull/supply/hydro_cascade.csv"
      lines: "data/downloaded_data/CODERS/data-pull/network/transmission_lines.csv"
      substations: "data/downloaded_data/CODERS/data-pull/network/substations.csv"
    load:
      ceei: "data/downloaded_data/load/CEEI_2020.xlsx"
      bch: "data/downloaded_data/load/bc_hydro_load/BalancingAuthorityLoad" # 2021.xls
  output:
    prepare_base_network:
      folder: "data/processed_data/network"
      regions: # list of all regions to include in the model build
        - "BC"
    create_hydro_assets:
      hydro_generation: "data/processed_data/hydro/existing/hydro_generation.csv"
      hydro_reservoir: "data/processed_data/hydro/existing/hydro_reservoirs.csv"
    create_cutout:
      cutout: "data/downloaded_data/cutout/BC_2021_2022.nc" # Modifications needed to how the year is added
    reservoir_inflows:
      fname: "data/processed_data/hydro/existing/bc_ext_reservoir_inflows.csv" # path + name
      inflow_method: "mean_inflow_calibrate"
      height: True
      flowspeed: 1 #WORKFLOW PARAM
    ror_ps:
      fname: "data/processed_data/hydro/existing/bc_ext_ror_ts.csv"
      height: True
      flowspeed: 1 #WORKFLOW PARAM
    create_ext_wind_assets:
      fname: "data/processed_data/wind/existing/bc_ext_wind_assets.csv"
    create_ext_wind_ts:
      calibration: 1 # Used to select whether to calibrate with annual gen average or not #WORKFLOW PARAM
      fname: "data/processed_data/wind/existing/bc_ext_wind_ts.csv" # for storing the timeseries for wind
    create_ext_solar_assets:
      fname: "data/processed_data/solar/existing/bc_ext_solar_assets.csv"
    create_ext_solar_ts:
      calibration: 0 # Used to select whether to calibrate with annual gen average or not #WORKFLOW PARAM
      fname: "data/processed_data/solar/existing/bc_ext_solar_ts.csv" # for storing the timeseries for wind
    pypsa_dict: # for all enrichment scripts
      folder: "data/pypsa_data/" # Modified 2023-11-29
      res: "hydro_reservoirs.pickle"
      ror: "hydro_ror.pickle"
      ror_water: "hydro_ror_water.pickle"
      wind: "wind.pickle"
      solar: "solar.pickle" # Change to solar
      tpp: "tpp.pickle"
      ff_infrastructure: "ff_infra.pickle"
      cogen: "cogen.pickle"
    enrich_format_wind: # snakemake usage only
      vre_sel: "wind"
    enrich_format_solar: # snakemake usage only
      vre_sel: "solar"
    enrich_format_tpp:
      gas_grid: 0
      UC: False # Unit commitment (T/F)
    create_ext_tpp_assets:
      gas_grid: False # True means the thermal generators will have unique gas bus at each of their nodes.
      UC: False # unit commitment for thermal PPs
      fname: "data/processed_data/tpp/existing/bc_ext_tpp_assets.csv"
    disaggregate_load:
      res_path: "data/processed_data/load/hourly_res.csv" # output path
      csmi_path: "data/processed_data/load/hourly_csmi.csv" # output path
    build_model:
      fname: "results/pypsa/prepared_net.nc"
      scenario: "0" # 50 or 100 depending on EV penetration
      charge_strat: "uncoordinated" #[uncoordinated, coordinated, v2g]
      region_res: "multiple"
      ng_prices: "data/Alberta/2021_ab_ng_prices.csv"

