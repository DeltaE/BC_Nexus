schema:
  FUEL:

  - name: land_for_powerplant_setup_fuel
    items:
    - name: land_prefix
      valid: land_prefix
      position: (1, 3)
    - name: literal_shortcode_for
      valid: literal_shortcode
      position: (4, 4)
    - name: power_generation_techs
      valid: power_generation_techs
      position: (5, 7)
  
  - name: primary_fuels_supply
