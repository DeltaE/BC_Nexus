      valid: public_water_usage
      position: (1, 3)
    - name: water
      valid: water
      position: (4, 6)
    - name: land_region
      valid: land_region
      position: (7, 9)
  
  - name: powerplant_water_usage
    items:
    - name: power_generation_techs
      valid: power_generation_techs
      position: (1, 3)
    - name: water
      valid: water
      position: (4 6)
    - name: land_region
      valid: land_region
      position: (7, 9)

