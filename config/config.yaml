pypsa:
  custom: # need to automate this or upload to repo. Pierre created this manually
      gen_wup: "data/downloaded_data/custom/hydro_gen_wup_features.csv"
      res_wup: "data/downloaded_data/custom/hydro_res_wup_features.csv"
      inflow_tables: "data/downloaded_data/custom/inflow_stats" # Has standardized names inside which are assumed
      line_table: "data/downloaded_data/custom/electric_power_generation_table_13_3a.xlsx" # Custom table for infering line parameters
  basin_files:  # need to automate this or upload to repo. Pierre created this manually
      na_file: "data/downloaded_data/HydroBASINS/hybas_na_lev12_v1c.shp"
      artic_file: "data/downloaded_data/HydroBASINS_artic/hybas_ar_lev12_v1c.shp"
  data: #Temp
    wind:
      can_turbines: "data/downloaded_data/wind/canada_turbines.xlsx"
      turbine_dict: "data/downloaded_data/wind/turbine_dict.json"
      gwa_speed: "data/downloaded_data/wind/british_columbia_wspd_100m.tif"
      gwa_geojson: "data/downloaded_data/wind/british_columbia.geojson"
    coders:
      gen_generic: "data/downloaded_data/CODERS/data-pull/supply/generation_generic.csv"
      hydro_existing: "data/downloaded_data/CODERS/data-pull/supply/hydro_existing.csv"
      generators: "data/downloaded_data/CODERS/data-pull/supply/generators.csv"
      hydro_cascade: "data/downloaded_data/CODERS/data-pull/supply/hydro_cascade.csv"
      lines: "data/downloaded_data/CODERS/data-pull/network/transmission_lines.csv"
      substations: "data/downloaded_data/CODERS/data-pull/network/substations.csv"
    load:
      ceei: "data/downloaded_data/load/CEEI_2020.xlsx"
      bch: "data/downloaded_data/load/bc_hydro_load/BalancingAuthorityLoad" # 2021.xls
  output:
    prepare_base_network:
      folder: "data/processed_data/network"
      regions: # list of all regions to include in the model build
        - "BC"
    create_hydro_assets:
      hydro_generation: "data/processed_data/hydro/existing/hydro_generation.csv"
      hydro_reservoir: "data/processed_data/hydro/existing/hydro_reservoirs.csv"
    create_cutout:
      cutout: "data/downloaded_data/cutout/BC_2021_2022.nc" # Modifications needed to how the year is added
    reservoir_inflows:
      fname: "data/processed_data/hydro/existing/bc_ext_reservoir_inflows.csv" # path + name
      inflow_method: "mean_inflow_calibrate"
      height: True
      flowspeed: 1 #WORKFLOW PARAM
    ror_ps:
      fname: "data/processed_data/hydro/existing/bc_ext_ror_ts.csv"
      height: True
      flowspeed: 1 #WORKFLOW PARAM
    create_ext_wind_assets:
      fname: "data/processed_data/wind/existing/bc_ext_wind_assets.csv"
    create_ext_wind_ts:
      calibration: 1 # Used to select whether to calibrate with annual gen average or not #WORKFLOW PARAM
      fname: "data/processed_data/wind/existing/bc_ext_wind_ts.csv" # for storing the timeseries for wind
    create_ext_solar_assets:
      fname: "data/processed_data/solar/existing/bc_ext_solar_assets.csv"
    create_ext_solar_ts:
      calibration: 0 # Used to select whether to calibrate with annual gen average or not #WORKFLOW PARAM
      fname: "data/processed_data/solar/existing/bc_ext_solar_ts.csv" # for storing the timeseries for wind
    pypsa_dict: # for all enrichment scripts
      folder: "data/pypsa_data/" # Modified 2023-11-29
      res: "hydro_reservoirs.pickle"
      ror: "hydro_ror.pickle"
      ror_water: "hydro_ror_water.pickle"
      wind: "wind.pickle"
      solar: "solar.pickle" # Change to solar
      tpp: "tpp.pickle"
      ff_infrastructure: "ff_infra.pickle"
      cogen: "cogen.pickle"
    enrich_format_wind: # snakemake usage only
      vre_sel: "wind"
    enrich_format_solar: # snakemake usage only
      vre_sel: "solar"
    enrich_format_tpp:
      gas_grid: 0
      UC: False # Unit commitment (T/F)
    create_ext_tpp_assets:
      gas_grid: False # True means the thermal generators will have unique gas bus at each of their nodes.
      UC: False # unit commitment for thermal PPs
      fname: "data/processed_data/tpp/existing/bc_ext_tpp_assets.csv"
    disaggregate_load:
      res_path: "data/processed_data/load/hourly_res.csv" # output path
      csmi_path: "data/processed_data/load/hourly_csmi.csv" # output path
    build_model:
      fname: "results/pypsa/prepared_net.nc"
      scenario: "0" # 50 or 100 depending on EV penetration
      charge_strat: "uncoordinated" #[uncoordinated, coordinated, v2g]
      region_res: "multiple"
      ng_prices: "data/Alberta/2021_ab_ng_prices.csv"



