<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 400" role="img" aria-label="BCNexus animated logo">
  <defs>
    <linearGradient id="grn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5cd267"/><stop offset="1" stop-color="#2c9c3a"/>
    </linearGradient>
    <linearGradient id="blu" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3aa8f0"/><stop offset="1" stop-color="#1566c8"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fff3b0"/><stop offset="70%" stop-color="#ffd83a"/><stop offset="100%" stop-color="#f4c20d"/>
    </radialGradient>
    <clipPath id="rise"><rect x="0" y="0" width="460" height="400"/></clipPath>
    <style>
      .mtn{transform-origin:230px 250px;animation:grow 1.1s .15s cubic-bezier(.2,.8,.2,1) both}
      @keyframes grow{from{transform:translateY(26px) scaleY(.6);opacity:0}to{transform:none;opacity:1}}
      .ridge{stroke:#eafff0;stroke-width:6;fill:none;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:300;stroke-dashoffset:300;animation:draw 1.3s .5s ease forwards}
      @keyframes draw{to{stroke-dashoffset:0}}
      .river{fill:none;stroke-linecap:round;stroke:url(#blu);stroke-dasharray:20 15;animation:flow 1.5s linear infinite, fade .7s .55s ease both}
      @keyframes flow{to{stroke-dashoffset:-70}}
      @keyframes fade{from{opacity:0}to{opacity:1}}
      .sundisc{animation:pulse 2.8s ease-in-out infinite;transform-origin:360px 96px}
      @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
      .turbine{animation:fade .7s .7s ease both}
      .wm{animation:fade .9s 1s ease both}
      @media (prefers-reduced-motion: reduce){
        .mtn,.sundisc,.wm,.turbine{animation:none;transform:none;opacity:1}
        .ridge{stroke-dashoffset:0;animation:none}.river{animation:fade .1s both}
      }
    </style>
  </defs>

  <g>
    <g>
      <line x1="360" y1="52" x2="360" y2="38" stroke="#f4c20d" stroke-width="6" stroke-linecap="round"/>
      <line x1="360" y1="140" x2="360" y2="154" stroke="#f4c20d" stroke-width="6" stroke-linecap="round"/>
      <line x1="316" y1="96" x2="302" y2="96" stroke="#f4c20d" stroke-width="6" stroke-linecap="round"/>
      <line x1="404" y1="96" x2="418" y2="96" stroke="#f4c20d" stroke-width="6" stroke-linecap="round"/>
      <line x1="329" y1="65" x2="319" y2="55" stroke="#f4c20d" stroke-width="6" stroke-linecap="round"/>
      <line x1="391" y1="127" x2="401" y2="137" stroke="#f4c20d" stroke-width="6" stroke-linecap="round"/>
      <line x1="391" y1="65" x2="401" y2="55" stroke="#f4c20d" stroke-width="6" stroke-linecap="round"/>
      <line x1="329" y1="127" x2="319" y2="137" stroke="#f4c20d" stroke-width="6" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="rotate" from="0 360 96" to="360 360 96" dur="24s" repeatCount="indefinite"/>
    </g>
    <circle class="sundisc" cx="360" cy="96" r="26" fill="url(#sun)"/>
  </g>

  <g class="mtn" clip-path="url(#rise)">
    <path fill="url(#grn)" d="M60 270 L124 132 L166 190 L210 92 L262 214 L300 168 L338 270 Z"/>
  </g>
  <path class="ridge" d="M96 264 L142 178 L188 226 L234 156"/>

  <g class="turbine">
    <line x1="150" y1="158" x2="148" y2="262" stroke="#2f7fb0" stroke-width="6" stroke-linecap="round"/>
    <g>
      <line x1="150" y1="158" x2="150" y2="116" stroke="#2f7fb0" stroke-width="6" stroke-linecap="round"/>
      <line x1="150" y1="158" x2="186" y2="179" stroke="#2f7fb0" stroke-width="6" stroke-linecap="round"/>
      <line x1="150" y1="158" x2="114" y2="179" stroke="#2f7fb0" stroke-width="6" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="rotate" from="0 150 158" to="360 150 158" dur="3.5s" repeatCount="indefinite"/>
    </g>
    <circle cx="150" cy="158" r="6" fill="#1566c8"/>
  </g>

  <path class="river" stroke-width="15" d="M92 322 C150 288 176 244 232 252 C292 260 308 308 364 288"/>
  <path class="river" stroke-width="11" style="opacity:.6;animation-delay:.3s" d="M120 346 C182 322 214 308 256 322"/>

  <g class="wm" font-family="Inter, 'Segoe UI', Arial, sans-serif" text-anchor="middle">
    <text x="206" y="386" font-size="30" font-weight="800" fill="#2c9c3a" font-style="italic">BC</text>
    <text x="290" y="390" font-size="42" font-weight="800" fill="#1566c8" letter-spacing="-.5">Nexus</text>
  </g>
</svg>
